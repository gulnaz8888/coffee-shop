name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-with-ansible:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone repository
        env:
          CLONE_REF: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "$CLONE_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible openssh-client
          ansible --version

      - name: Prepare SSH key and inventory
        working-directory: ./repo
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          cat > ansible/inventory.generated.ini <<EOF
          [app_servers]
          ${DEPLOY_HOST} ansible_user=${DEPLOY_USER} ansible_port=${DEPLOY_PORT:-22} ansible_ssh_private_key_file=$HOME/.ssh/id_ed25519 ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Build Ansible variable file
        working-directory: ./repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
        run: |
          python3 - <<'PY'
          import json
          import os

          data = {
              "github_repository": os.environ["GITHUB_REPOSITORY"],
              "github_token": os.environ["GITHUB_TOKEN"],
              "deploy_branch": os.environ["GITHUB_REF_NAME"],
              "app_dir": os.environ.get("DEPLOY_APP_DIR") or "/opt/coffee-shop",
              "jwt_secret": os.environ["JWT_SECRET"],
              "unsplash_access_key": os.environ.get("UNSPLASH_ACCESS_KEY") or "demo_key",
              "grafana_admin_password": os.environ.get("GRAFANA_ADMIN_PASSWORD") or "admin",
          }

          with open("ansible/extra-vars.json", "w", encoding="utf-8") as fh:
              json.dump(data, fh)
          PY

      - name: Run Ansible deployment
        working-directory: ./repo
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i ansible/inventory.generated.ini ansible/playbook.yml -e @ansible/extra-vars.json

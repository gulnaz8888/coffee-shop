---
- name: Deploy Coffee Shop with Docker Compose
  hosts: app_servers
  become: true
  vars:
    app_dir: /opt/coffee-shop
    deploy_branch: main
    mongo_uri: mongodb://mongo:27017/coffeeshop
    grafana_admin_password: admin

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker and deployment dependencies
      apt:
        name:
          - docker.io
          - docker-compose-plugin
          - git
          - curl
          - ca-certificates
        state: present

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        state: started
        enabled: true

    - name: Add deploy user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Ensure application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Sync repository on target host
      git:
        repo: "https://x-access-token:{{ github_token }}@github.com/{{ github_repository }}.git"
        dest: "{{ app_dir }}"
        version: "{{ deploy_branch }}"
        force: true
        update: true
      no_log: true

    - name: Write deployment environment file
      copy:
        dest: "{{ app_dir }}/.env"
        content: |
          JWT_SECRET={{ jwt_secret }}
          UNSPLASH_ACCESS_KEY={{ unsplash_access_key }}
          MONGO_URI={{ mongo_uri }}
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Deploy stack with Docker Compose
      command:
        cmd: docker compose up -d --build --remove-orphans
        chdir: "{{ app_dir }}"

    - name: Wait for exposed ports
      wait_for:
        host: 127.0.0.1
        port: "{{ item }}"
        delay: 5
        timeout: 180
      loop:
        - 80
        - 3001
        - 3002
        - 3003
        - 3004
        - 3005
        - 3006
        - 3007

    - name: Run smoke checks
      uri:
        url: "{{ item.url }}"
        status_code: 200
      register: smoke_check
      until: smoke_check.status == 200
      retries: 12
      delay: 10
      loop:
        - { url: "http://127.0.0.1/" }
        - { url: "http://127.0.0.1:3001/health" }
        - { url: "http://127.0.0.1:3002/health" }
        - { url: "http://127.0.0.1:3003/health" }
        - { url: "http://127.0.0.1:3004/health" }
        - { url: "http://127.0.0.1:3005/health" }
        - { url: "http://127.0.0.1:3006/health" }
        - { url: "http://127.0.0.1:3007/health" }

    - name: Show running containers
      command: docker ps --format "table {{.Names}}\t{{.Status}}"
      register: docker_ps

    - name: Print running containers
      debug:
        msg: "{{ docker_ps.stdout_lines }}"

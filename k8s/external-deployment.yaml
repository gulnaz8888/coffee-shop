apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-service
  namespace: default
  labels:
    app: external-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-service
  template:
    metadata:
      labels:
        app: external-service
        tier: backend
    spec:
      containers:
      - name: external-service
        image: coffee-shop-external-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
          name: http
        env:
        - name: UNSPLASH_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: unsplash-secret
              key: access_key
        - name: PORT
          value: "3003"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: external-service
  namespace: default
  labels:
    app: external-service
spec:
  selector:
    app: external-service
  ports:
  - port: 3003
    targetPort: 3003
    name: http
  type: ClusterIP

name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone repository
        env:
          CLONE_REF: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "$CLONE_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Log in to GHCR
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_PASSWORD" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and push images
        working-directory: ./repo
        run: |
          IMAGE_NAMESPACE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"

          declare -a images=(
            "coffee-shop-auth-service|./services/auth-service|./services/auth-service/Dockerfile"
            "coffee-shop-reservation-service|./services/reservation-service|./services/reservation-service/Dockerfile"
            "coffee-shop-external-service|./services/external-service|./services/external-service/Dockerfile"
            "coffee-shop-order-service|./services/order-service|./services/order-service/Dockerfile"
            "coffee-shop-notification-service|./services/notification-service|./services/notification-service/Dockerfile"
            "coffee-shop-product-service|./services/product-service|./services/product-service/Dockerfile"
            "coffee-shop-payment-service|./services/payment-service|./services/payment-service/Dockerfile"
            "coffee-shop-frontend|./nginx|./nginx/Dockerfile"
          )

          for item in "${images[@]}"; do
            IFS='|' read -r image context dockerfile <<< "$item"
            full_image="${IMAGE_NAMESPACE}/${image}"
            docker build -f "$dockerfile" -t "${full_image}:${GITHUB_SHA}" -t "${full_image}:latest" "$context"
            docker push "${full_image}:${GITHUB_SHA}"
            docker push "${full_image}:latest"
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Clone repository
        env:
          CLONE_REF: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "$CLONE_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Install kubectl
        run: |
          curl -fsSL -o kubectl https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Resolve deploy variables
        env:
          RAW_NAMESPACE: ${{ vars.KUBE_NAMESPACE }}
        run: |
          echo "KUBE_NAMESPACE=${RAW_NAMESPACE:-default}" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"

      - name: Create namespace and secrets
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          kubectl create namespace "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          until kubectl get serviceaccount default -n "$KUBE_NAMESPACE" >/dev/null 2>&1; do sleep 2; done

          kubectl -n "$KUBE_NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl patch serviceaccount default -n "$KUBE_NAMESPACE" \
            --type merge \
            -p '{"imagePullSecrets":[{"name":"ghcr-pull-secret"}]}'

          kubectl -n "$KUBE_NAMESPACE" create secret generic jwt-secret \
            --from-literal=secret="$JWT_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$KUBE_NAMESPACE" create secret generic unsplash-secret \
            --from-literal=access_key="$UNSPLASH_ACCESS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Rewrite manifests for target namespace and images
        working-directory: ./repo
        run: |
          sed -i "s/^namespace: .*/namespace: ${KUBE_NAMESPACE}/" k8s/kustomization.yaml
          sed -i "s|image: coffee-shop-auth-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-auth-service:${GITHUB_SHA}|" k8s/auth-deployment.yaml
          sed -i "s|image: coffee-shop-reservation-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-reservation-service:${GITHUB_SHA}|" k8s/reservation-deployment.yaml
          sed -i "s|image: coffee-shop-external-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-external-service:${GITHUB_SHA}|" k8s/external-deployment.yaml
          sed -i "s|image: coffee-shop-order-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-order-service:${GITHUB_SHA}|" k8s/order-deployment.yaml
          sed -i "s|image: coffee-shop-notification-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-notification-service:${GITHUB_SHA}|" k8s/notification-deployment.yaml
          sed -i "s|image: coffee-shop-product-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-product-service:${GITHUB_SHA}|" k8s/product-deployment.yaml
          sed -i "s|image: coffee-shop-payment-service:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-payment-service:${GITHUB_SHA}|" k8s/payment-deployment.yaml
          sed -i "s|image: coffee-shop-frontend:latest|image: ${IMAGE_NAMESPACE}/coffee-shop-frontend:${GITHUB_SHA}|" k8s/frontend-deployment.yaml

      - name: Deploy to Kubernetes
        working-directory: ./repo
        run: kubectl apply -k k8s

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/mongodb -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/auth-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/reservation-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/external-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/order-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/notification-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/product-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/payment-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/frontend -n "$KUBE_NAMESPACE" --timeout=180s

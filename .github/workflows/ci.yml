name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  validate-and-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone repository
        env:
          CLONE_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "$CLONE_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Validate docker-compose
        working-directory: ./repo
        run: docker compose config > /dev/null

      - name: Check Node entrypoints syntax
        working-directory: ./repo
        run: |
          for file in services/*/server.js; do
            echo "Checking ${file}"
            node --check "${file}"
          done

      - name: Start stack for smoke tests
        working-directory: ./repo
        env:
          JWT_SECRET: ci-secret
          UNSPLASH_ACCESS_KEY: demo_key
          GRAFANA_ADMIN_PASSWORD: admin
        run: docker compose up -d --build

      - name: Run smoke tests
        working-directory: ./repo
        run: |
          targets=(
            "http://127.0.0.1/"
            "http://127.0.0.1:3001/health"
            "http://127.0.0.1:3002/health"
            "http://127.0.0.1:3003/health"
            "http://127.0.0.1:3004/health"
            "http://127.0.0.1:3005/health"
            "http://127.0.0.1:3006/health"
            "http://127.0.0.1:3007/health"
          )

          for target in "${targets[@]}"; do
            echo "Checking ${target}"
            for attempt in {1..30}; do
              if curl --silent --show-error --fail "$target" > /dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Smoke test failed for ${target}"
                exit 1
              fi
              sleep 5
            done
          done

      - name: Show compose logs on failure
        if: failure()
        working-directory: ./repo
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        working-directory: ./repo
        run: docker compose down -v

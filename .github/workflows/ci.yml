name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone repository
        env:
          CLONE_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch "$CLONE_REF" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Show tool versions
        working-directory: ./repo
        run: |
          node --version
          docker --version
          docker compose version

      - name: Install kubectl
        run: |
          curl -fsSL -o kubectl https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Validate docker-compose
        working-directory: ./repo
        run: docker compose config > /dev/null

      - name: Check Node entrypoints syntax
        working-directory: ./repo
        run: |
          for file in services/*/server.js; do
            echo "Checking ${file}"
            node --check "${file}"
          done

      - name: Validate Kubernetes manifests
        working-directory: ./repo
        run: kubectl kustomize k8s > /dev/null

      - name: Build application images
        working-directory: ./repo
        run: |
          docker compose build \
            auth-service \
            reservation-service \
            external-service \
            order-service \
            notification-service \
            product-service \
            payment-service \
            frontend

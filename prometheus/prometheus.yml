global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']

  - job_name: 'reservation-service'
    static_configs:
      - targets: ['reservation-service:3002']

  - job_name: 'external-service'
    static_configs:
      - targets: ['external-service:3003']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3004']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3005']

  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:3006']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:3007']

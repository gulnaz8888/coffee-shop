apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: default
  labels:
    app: reservation-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
        tier: backend
    spec:
      containers:
      - name: reservation-service
        image: coffee-shop-reservation-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
          name: http
        env:
        - name: MONGO_URI
          value: "mongodb://mongo-service:27017/coffeeshop"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        - name: PORT
          value: "3002"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: default
  labels:
    app: reservation-service
spec:
  selector:
    app: reservation-service
  ports:
  - port: 3002
    targetPort: 3002
    name: http
  type: ClusterIP

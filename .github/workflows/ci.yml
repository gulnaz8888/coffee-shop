name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate docker-compose
        run: docker compose config > /dev/null

      - name: Check Node entrypoints syntax
        run: |
          for file in services/*/server.js; do
            echo "Checking ${file}"
            node --check "${file}"
          done

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Validate Kubernetes manifests
        run: kubectl kustomize k8s > /dev/null

      - name: Build application images
        run: |
          docker compose build \
            auth-service \
            reservation-service \
            external-service \
            order-service \
            notification-service \
            product-service \
            payment-service \
            frontend

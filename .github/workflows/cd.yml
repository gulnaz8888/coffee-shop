name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: coffee-shop-auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - image: coffee-shop-reservation-service
            context: ./services/reservation-service
            dockerfile: ./services/reservation-service/Dockerfile
          - image: coffee-shop-external-service
            context: ./services/external-service
            dockerfile: ./services/external-service/Dockerfile
          - image: coffee-shop-order-service
            context: ./services/order-service
            dockerfile: ./services/order-service/Dockerfile
          - image: coffee-shop-notification-service
            context: ./services/notification-service
            dockerfile: ./services/notification-service/Dockerfile
          - image: coffee-shop-product-service
            context: ./services/product-service
            dockerfile: ./services/product-service/Dockerfile
          - image: coffee-shop-payment-service
            context: ./services/payment-service
            dockerfile: ./services/payment-service/Dockerfile
          - image: coffee-shop-frontend
            context: ./nginx
            dockerfile: ./nginx/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize registry namespace
        run: echo "IMAGE_NAMESPACE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy variables
        env:
          RAW_NAMESPACE: ${{ vars.KUBE_NAMESPACE }}
        run: |
          echo "KUBE_NAMESPACE=${RAW_NAMESPACE:-default}" >> "$GITHUB_ENV"
          echo "IMAGE_NAMESPACE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"

      - name: Create namespace and registry pull secret
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          kubectl create namespace "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          until kubectl get serviceaccount default -n "$KUBE_NAMESPACE" >/dev/null 2>&1; do sleep 2; done
          kubectl -n "$KUBE_NAMESPACE" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n "$KUBE_NAMESPACE" \
            --type merge \
            -p '{"imagePullSecrets":[{"name":"ghcr-pull-secret"}]}'

      - name: Create application secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          kubectl -n "$KUBE_NAMESPACE" create secret generic jwt-secret \
            --from-literal=secret="$JWT_SECRET" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$KUBE_NAMESPACE" create secret generic unsplash-secret \
            --from-literal=access_key="$UNSPLASH_ACCESS_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Inject target namespace and image tags
        working-directory: ./k8s
        run: |
          kustomize edit set namespace "$KUBE_NAMESPACE"
          kustomize edit set image coffee-shop-auth-service="$IMAGE_NAMESPACE/coffee-shop-auth-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-reservation-service="$IMAGE_NAMESPACE/coffee-shop-reservation-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-external-service="$IMAGE_NAMESPACE/coffee-shop-external-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-order-service="$IMAGE_NAMESPACE/coffee-shop-order-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-notification-service="$IMAGE_NAMESPACE/coffee-shop-notification-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-product-service="$IMAGE_NAMESPACE/coffee-shop-product-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-payment-service="$IMAGE_NAMESPACE/coffee-shop-payment-service:$GITHUB_SHA"
          kustomize edit set image coffee-shop-frontend="$IMAGE_NAMESPACE/coffee-shop-frontend:$GITHUB_SHA"

      - name: Deploy to Kubernetes
        run: kubectl apply -k k8s

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/mongodb -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/auth-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/reservation-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/external-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/order-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/notification-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/product-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/payment-service -n "$KUBE_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/frontend -n "$KUBE_NAMESPACE" --timeout=180s

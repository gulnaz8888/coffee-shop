<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Coffee Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #faf6f0; color: #2c1a08; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1, h2 { color: #b06030; margin-bottom: 20px; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #b06030; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-right: 10px; }
        button:hover { background: #c07040; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-card h3 { margin-bottom: 8px; }
        .product-card p { color: #b06030; font-size: 20px; font-weight: bold; margin-bottom: 12px; }
        .order-card { background: #f3ece0; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .error { color: red; margin-top: 8px; }
        .success { color: green; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>☕ Aurora Coffee Shop</h1>

    <!-- Auth Card -->
    <div class="card">
        <h2>Account</h2>
        <div id="auth-box">
            <input type="email" id="email" placeholder="Email" value="test@coffee.com">
            <input type="password" id="password" placeholder="Password" value="123456">
            <div class="flex-row">
                <button id="signin-btn">Sign In</button>
                <button id="register-btn">Register</button>
                <button id="logout-btn" class="hidden">Logout</button>
            </div>
            <div id="auth-status"></div>
        </div>
        <div id="profile-box" class="hidden">
            <p>Welcome, <span id="user-email-display"></span>!</p>
            <button id="logout-btn2">Logout</button>
        </div>
    </div>

    <!-- Products Card -->
    <div class="card">
        <h2>Products (from Product Service)</h2>
        <div id="products-list" class="products-grid">
            <p>Loading products...</p>
        </div>
    </div>

    <!-- Orders Card -->
    <div class="card">
        <h2>My Orders (from Order Service)</h2>
        <div id="orders-list">
            <p>Sign in to see your orders.</p>
        </div>
    </div>
</div>

<script>
    let token = localStorage.getItem('token');

    // Helper API call
    async function apiCall(url, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        try {
            const response = await fetch(url, { ...options, headers });
            return await response.json();
        } catch (err) {
            console.error('API Error:', err);
            return null;
        }
    }

    // Load products from Product Service
    async function loadProducts() {
        const container = document.getElementById('products-list');
        container.innerHTML = '<p>Loading products...</p>';
        try {
            const response = await fetch('/api/products/products');
            const products = await response.json();
            if (products && products.length) {
                container.innerHTML = products.map(p => `
                    <div class="product-card">
                        <h3>${p.name || 'Product'}</h3>
                        <p>${p.price || 0} ₸</p>
                        <button onclick="createOrder('${p._id || p.id}')">Order Now</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p>No products found. Try seeding: <button onclick="seedProducts()">Seed Products</button></p>';
            }
        } catch (err) {
            container.innerHTML = '<p>⚠️ Product Service unavailable. Make sure coffee_product container is running.</p>';
        }
    }

    // Create order via Order Service
    window.createOrder = async function(productId) {
        if (!token) {
            document.getElementById('auth-status').innerHTML = '<p class="error">Please sign in first!</p>';
            return;
        }
        try {
            const order = await apiCall('/api/orders/orders', {
                method: 'POST',
                body: JSON.stringify({ items: [{ productId, quantity: 1, price: 100 }], totalAmount: 100 })
            });
            if (order && order._id) {
                document.getElementById('auth-status').innerHTML = '<p class="success">✅ Order created successfully!</p>';
                loadOrders();
                setTimeout(() => document.getElementById('auth-status').innerHTML = '', 3000);
            } else {
                throw new Error('Order failed');
            }
        } catch (err) {
            document.getElementById('auth-status').innerHTML = '<p class="error">❌ Failed to create order</p>';
        }
    };

    // Load user orders
    async function loadOrders() {
        if (!token) {
            document.getElementById('orders-list').innerHTML = '<p>Sign in to see your orders.</p>';
            return;
        }
        const container = document.getElementById('orders-list');
        container.innerHTML = '<p>Loading orders...</p>';
        try {
            const orders = await apiCall('/api/orders/orders');
            if (orders && orders.length) {
                container.innerHTML = orders.map(o => `
                    <div class="order-card">
                        <strong>Order #${o._id}</strong> - Status: ${o.status || 'pending'} - Total: ${o.totalAmount || 0} ₸
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p>No orders yet. Create one above!</p>';
            }
        } catch (err) {
            container.innerHTML = '<p>⚠️ Order Service unavailable.</p>';
        }
    }

    // Seed products (if empty)
    window.seedProducts = async function() {
        try {
            await fetch('/api/products/seed', { method: 'POST' });
            alert('Products seeded! Refresh page.');
            loadProducts();
        } catch (err) {
            alert('Seed failed');
        }
    };

    // Login
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const data = await apiCall('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });
        if (data && data.token) {
            token = data.token;
            localStorage.setItem('token', token);
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('profile-box').classList.remove('hidden');
            document.getElementById('user-email-display').innerText = email;
            document.getElementById('auth-status').innerHTML = '<p class="success">✅ Logged in!</p>';
            loadOrders();
            setTimeout(() => document.getElementById('auth-status').innerHTML = '', 2000);
        } else {
            document.getElementById('auth-status').innerHTML = '<p class="error">❌ Login failed</p>';
        }
    }

    // Register
    async function register() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = email.split('@')[0];
        const data = await apiCall('/api/auth/register', {
            method: 'POST',
            body: JSON.stringify({ name, email, password })
        });
        if (data && data.token) {
            document.getElementById('auth-status').innerHTML = '<p class="success">✅ Registered! Please sign in.</p>';
        } else {
            document.getElementById('auth-status').innerHTML = '<p class="error">❌ Registration failed</p>';
        }
    }

    // Logout
    function logout() {
        localStorage.removeItem('token');
        token = null;
        location.reload();
    }

    // Check auth on load
    function checkAuth() {
        if (token) {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('profile-box').classList.remove('hidden');
            loadOrders();
        } else {
            document.getElementById('auth-box').classList.remove('hidden');
            document.getElementById('profile-box').classList.add('hidden');
        }
    }

    // Wire up buttons
    document.getElementById('signin-btn').onclick = login;
    document.getElementById('register-btn').onclick = register;
    const logoutBtns = document.querySelectorAll('#logout-btn, #logout-btn2');
    logoutBtns.forEach(btn => btn.onclick = logout);

    // Load products and check auth
    loadProducts();
    checkAuth();
</script>
</body>
</html>

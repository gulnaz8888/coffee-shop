services:
  mongo:
    image: mongo:6
    container_name: coffee_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - coffee_network

  auth-service:
    build: ./services/auth-service
    container_name: coffee_auth
    restart: always
    ports:
      - "3001:3001"
    environment:
      MONGO_URI: mongodb://mongo:27017/coffeeshop
      JWT_SECRET: secret
    depends_on:
      - mongo
    networks:
      - coffee_network

  reservation-service:
    build: ./services/reservation-service
    container_name: coffee_reservation
    restart: always
    ports:
      - "3002:3002"
    environment:
      MONGO_URI: mongodb://mongo:27017/coffeeshop
      JWT_SECRET: secret
    depends_on:
      - mongo
    networks:
      - coffee_network

  external-service:
    build: ./services/external-service
    container_name: coffee_external
    restart: always
    ports:
      - "3003:3003"
    networks:
      - coffee_network

  order-service:
    build: ./services/order-service
    container_name: coffee_order
    restart: always
    ports:
      - "3004:3004"
    environment:
      MONGO_URI: mongodb://mongo:27017/coffeeshop
    depends_on:
      - mongo
    networks:
      - coffee_network

  notification-service:
    build: ./services/notification-service
    container_name: coffee_notification
    restart: always
    ports:
      - "3005:3005"
    environment:
      MONGO_URI: mongodb://mongo:27017/coffeeshop
    depends_on:
      - mongo
    networks:
      - coffee_network

  product-service:
    build: ./services/product-service
    container_name: coffee_product
    restart: always
    ports:
      - "3006:3006"
    environment:
      MONGO_URI: mongodb://mongo:27017/coffeeshop
    depends_on:
      - mongo
    networks:
      - coffee_network

  payment-service:
    build: ./services/payment-service
    container_name: coffee_payment
    restart: always
    ports:
      - "3007:3007"
    environment:
      MONGO_URI: mongodb://mongo:27017/coffeeshop
    depends_on:
      - mongo
    networks:
      - coffee_network

  frontend:
    build: ./nginx
    container_name: coffee_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - reservation-service
      - external-service
    networks:
      - coffee_network

  prometheus:
    image: prom/prometheus:latest
    container_name: coffee_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    networks:
      - coffee_network

  grafana:
    image: grafana/grafana:latest
    container_name: coffee_grafana
    restart: always
    ports:
      - "4000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - coffee_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: coffee_node_exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - coffee_network

networks:
  coffee_network:
    driver: bridge

volumes:
  mongo_data:
  grafana_data:
